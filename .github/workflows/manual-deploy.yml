name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        default: "functions"
        type: choice
        options:
          - functions
          - app
          - both
      app_version:
        description: "App version to deploy (e.g. 1.0.0). Leave empty to rebuild from main."
        required: false
        type: string
      server_version:
        description: "Server version to deploy (e.g. 1.0.0). Leave empty to rebuild from main."
        required: false
        type: string

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    if: inputs.target == 'functions' || inputs.target == 'both'
    steps:
      - uses: actions/checkout@v4
        if: ${{ inputs.server_version == '' }}

      - name: Download Server Release Artifacts
        if: ${{ inputs.server_version != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_VERSION: ${{ inputs.server_version }}
        run: |
          gh release download "server-v${SERVER_VERSION}" -p "server-release.zip"
          unzip -o server-release.zip
          rm server-release.zip

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --prefix functions install --frozen-lockfile

      - name: Authenticate with GCP
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> "$GITHUB_ENV"

      - name: Deploy functions
        run: |
          echo "🚀 Deploying Firebase Functions..."
          pnpm exec firebase deploy --only functions --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          echo "✅ Functions deployed."

  deploy-app:
    runs-on: ubuntu-latest
    if: inputs.target == 'app' || inputs.target == 'both'
    permissions:
      pages: write
      id-token: write
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ inputs.app_version == '' }}

      - name: Download App Release Artifacts
        if: ${{ inputs.app_version != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_VERSION: ${{ inputs.app_version }}
        run: |
          gh release download "app-v${APP_VERSION}" -p "app-release.zip"
          unzip -o app-release.zip
          rm app-release.zip

      - uses: pnpm/action-setup@v4
        if: ${{ inputs.app_version == '' }}
        with:
          version: latest

      - uses: actions/setup-node@v4
        if: ${{ inputs.app_version == '' }}
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: ${{ inputs.app_version == '' }}
      - run: pnpm exec svelte-kit sync
        if: ${{ inputs.app_version == '' }}

      - name: Build app
        if: ${{ inputs.app_version == '' }}
        run: pnpm build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_APP_CHECK_SITE_KEY: ${{ secrets.VITE_APP_CHECK_SITE_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - uses: actions/deploy-pages@v4
        id: deployment
